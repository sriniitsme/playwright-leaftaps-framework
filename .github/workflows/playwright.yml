name: Playwright Tests

on:
  push:
    branches: [ main, master ]

  pull_request:
    branches: [ main, master ]

  schedule:
    - cron: '0 2 * * *'

jobs:
  smoke:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        env: [qa, dev]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Smoke (${{ matrix.env }})
        run: npx playwright test -g @smoke
        env:
          CI: true
          TEST_ENV: ${{ matrix.env }}

      - name: Upload Report (${{ matrix.env }})
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-report-${{ matrix.env }}
          path: playwright-report/
      - name: allure-results-smoke-${{ matrix.env }}
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-${{ matrix.env }}
          path: allure-results/

  regression:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        env: [qa, dev]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Regression (${{ matrix.env }})
        run: npx playwright test -g @regression
        env:
          CI: true
          TEST_ENV: ${{ matrix.env }}

      - name: Upload Report (${{ matrix.env }})
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-report-${{ matrix.env }}
          path: playwright-report/
      - name: allure-results-regression-${{ matrix.env }}
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-${{ matrix.env }}
          path: allure-results/